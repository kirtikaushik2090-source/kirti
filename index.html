<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EMI Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
<h2>EMI Calculator</h2>

<div class="input-group">
<label>Loan Amount (₹)</label>
<input type="range" id="loan-amount" min="100000" max="5000000" value="1000000" step="5000">
<span id="loan-amount-display">₹ 1000000</span>
</div>

<div class="input-group">
<label>Interest Rate (%)</label>
<input type="range" id="interest-rate" min="1" max="15" value="6.5" step="0.1">
<span id="interest-rate-display">6.5%</span>
</div>

<div class="input-group">
<label>Loan Tenure (Years)</label>
<input type="range" id="loan-tenure" min="1" max="30" value="5">
<span id="loan-tenure-display">5 yr</span>
</div>

<div class="result">
<h3>Monthly EMI: ₹ <span id="emi-result">0</span></h3>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
